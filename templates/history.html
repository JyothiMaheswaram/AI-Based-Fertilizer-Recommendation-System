<!DOCTYPE html>
<html>

<head>
    <title>History</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav>

<a href="/">Home</a>

<a href="/fertilizer">Fertilizer</a>

<a href="/digitaltwin">Digital Twin</a>

<a href="/history">History</a>

<a href="/about">About</a>

</nav>

<h1>📜 Sensor History</h1>

<!-- Clear History Button -->
<div style="text-align:right; margin:20px;">

<form action="/clear_history"
      method="POST"
      onsubmit="return confirm('Are you sure you want to clear all history?');">

<button type="submit"
style="background:#d9534f;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;">

🗑 Clear History

</button>

</form>

</div>

{% if records %}

<table class="history-table">

    <thead>
        <tr>
            <th>Date</th>
            <th>Crop</th>
            <th>Temperature</th>
            <th>Humidity</th>
            <th>Fertilizer</th>
        </tr>
    </thead>

    <tbody>

    {% for row in records %}

        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
        </tr>

    {% endfor %}

    </tbody>

</table>

{% else %}

<h3 style="text-align:center;color:gray;">
    No History Available
</h3>

{% endif %}

</body>
</html>
