<!DOCTYPE html>
<html>

<head>
    <title>Fertilizer Recommendation</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav>

<a href="/home">Home</a>

<a href="/digitaltwin">Digital Twin</a>

<a href="/fertilizer">Fertilizer</a>

<a href="/history">History</a>

<a href="/queries">Queries</a>

<a href="/about">About</a>

<a href="/logout">Logout</a>

</nav>

<h1>🧪 Fertilizer Recommendation</h1>

<div class="container">

       {% if fertilizer %}

<div class="result-box">

<h3>🌿 Recommended Fertilizer</h3>

<h2>{{ fertilizer }}</h2>

</div>

{% endif %}

<form action="/predict" method="POST">

<h2>Enter Parameter Details</h2>

<label class="field-label">Crop</label>

<select name="crop" required>
    <option value="">Select Crop</option>

    <option value="Cotton" {% if farm and farm.crop=="Cotton" %}selected{% endif %}>Cotton</option>

    <option value="Maize" {% if farm and farm.crop=="Maize" %}selected{% endif %}>Maize</option>

    <option value="Potato" {% if farm and farm.crop=="Potato" %}selected{% endif %}>Potato</option>

    <option value="Rice" {% if farm and farm.crop=="Rice" %}selected{% endif %}>Rice</option>

    <option value="Sugarcane" {% if farm and farm.crop=="Sugarcane" %}selected{% endif %}>Sugarcane</option>

    <option value="Tomato" {% if farm and farm.crop=="Tomato" %}selected{% endif %}>Tomato</option>

    <option value="Wheat" {% if farm and farm.crop=="Wheat" %}selected{% endif %}>Wheat</option>
</select>

<br><br>

<label class="field-label">Soil Type</label>

<select name="soil" required>
    <option value="">Select Soil</option>

    <option value="Clay" {% if farm and farm.soil=="Clay" %}selected{% endif %}>Clay</option>

    <option value="Loamy" {% if farm and farm.soil=="Loamy" %}selected{% endif %}>Loamy</option>

    <option value="Sandy" {% if farm and farm.soil=="Sandy" %}selected{% endif %}>Sandy</option>

    <option value="Silt" {% if farm and farm.soil=="Silt" %}selected{% endif %}>Silt</option>
</select>

<br><br>

<label class="field-label">Nitrogen</label>

<input type="number"
       name="nitrogen"
       value="{{ farm.nitrogen if farm else '' }}"
       required>

<br><br>

<label class="field-label">Phosphorus</label>

<input type="number"
       name="phosphorus"
       value="{{ farm.phosphorus if farm else '' }}"
       required>

<br><br>

<label class="field-label">Potassium</label>

<input type="number"
       name="potassium"
       value="{{ farm.potassium if farm else '' }}"
       required>

<br><br>

<label class="field-label">Soil pH</label>

<input type="number"
       step="0.1"
       name="ph"
       value="{{ farm.ph if farm else '' }}"
       required>

<br><br>

<label class="field-label">Soil Moisture (%)</label>

<input type="number"
       step="0.1"
       name="moisture"
       value="{{ farm.moisture if farm else '' }}"
       required>

<br><br>

<label class="field-label">Temperature (°C)</label>

<input type="number"
       name="temperature"
       value="{{ farm.temperature if farm else '' }}"
       required>

<br><br>

<label class="field-label">Humidity (%)</label>

<input type="number"
       name="humidity"
       value="{{ farm.humidity if farm else '' }}"
       required>

<br><br>

<button type="submit">
🌱 Predict Fertilizer
</button>

</form>

</div>



</body>

</html>
